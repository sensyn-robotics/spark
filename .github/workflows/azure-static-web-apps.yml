# Builds and deploys Spark examples site to Azure Static Web Apps
name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'examples/**'
      - 'docs/**'
      - 'index.html'
      - 'examples.html'
      - 'package.json'
      - '.github/workflows/azure-static-web-apps.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'docs/**'
      - 'index.html'
      - 'examples.html'
      - 'package.json'
      - '.github/workflows/azure-static-web-apps.yml'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build site
        run: npm run site:build

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_MEADOW_018297C00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          skip_api_build: true
          app_location: "site"
          output_location: ""

      - name: Comment PR with staging URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const stagingUrl = `https://nice-meadow-018297c00-${prNumber}.westus2.6.azurestaticapps.net/`;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Azure Static Web Apps Preview Deployed!\n\n✅ Your changes have been deployed to a staging environment.\n\n**Preview URL:** ${stagingUrl}\n\n**Test the Distance Measurement example:**\n${stagingUrl}examples/distance-rescale/\n\n_This staging environment will be automatically deleted when the PR is closed._`
            });

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Azure Static Web Apps staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_MEADOW_018297C00 }}
          action: "close"
